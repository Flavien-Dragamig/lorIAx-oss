# ============================================================
# LorIAx — Docker Compose Full (Production avec nginx)
# Usage : docker compose -f docker/docker-compose.yml up -d
# ============================================================

services:
  app:
    build:
      context: ..
      dockerfile: Dockerfile
    env_file:
      - ../.env.local
    environment:
      - DATABASE_URL=postgresql://loriax:${POSTGRES_PASSWORD:-loriax_secret}@postgres:5432/loriax
      - S3_ENDPOINT=garage
      - S3_PORT=3900
      - WORKSPACES_PATH=/app/workspaces
    volumes:
      - workspaces:/app/workspaces
    depends_on:
      postgres:
        condition: service_healthy
      garage:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - frontend
      - backend

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: loriax
      POSTGRES_USER: loriax
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-loriax_secret}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U loriax -d loriax"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - backend

  garage:
    image: dxflrs/garage:v1.1.0
    volumes:
      - garage_data:/var/lib/garage/data
      - garage_meta:/var/lib/garage/meta
      - ./garage/garage.toml:/etc/garage.toml:ro
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:3909/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - backend

  garage-init:
    image: dxflrs/garage:v1.1.0
    depends_on:
      garage:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      sleep 2;
      garage -c /etc/garage.toml layout assign -z dc1 -c 1G $$(garage -c /etc/garage.toml node id -q | cut -d@ -f1) 2>/dev/null || true;
      garage -c /etc/garage.toml layout apply --version 1 2>/dev/null || true;
      garage -c /etc/garage.toml key import --yes ${S3_ACCESS_KEY:-loriax_s3} ${S3_SECRET_KEY:-loriax_s3_secret} --name loriax 2>/dev/null || true;
      garage -c /etc/garage.toml bucket create loriax-files 2>/dev/null || true;
      garage -c /etc/garage.toml bucket allow --read --write --owner loriax-files --key loriax 2>/dev/null || true;
      exit 0;
      "
    volumes:
      - garage_meta:/var/lib/garage/meta
      - ./garage/garage.toml:/etc/garage.toml:ro
    networks:
      - backend

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app
    restart: unless-stopped
    networks:
      - frontend

  backup:
    image: pgvector/pgvector:pg16
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGHOST: postgres
      PGUSER: loriax
      PGPASSWORD: ${POSTGRES_PASSWORD:-loriax_secret}
      PGDATABASE: loriax
    volumes:
      - backups:/backups
    entrypoint: >
      /bin/sh -c "
      echo '0 2 * * * pg_dump -Fc loriax > /backups/loriax-$$(date +%Y%m%d-%H%M%S).dump && find /backups -name \"*.dump\" -mtime +7 -delete' > /var/spool/cron/crontabs/root
      && crond -f -l 2
      "
    restart: unless-stopped
    networks:
      - backend

volumes:
  pgdata:
  garage_data:
  garage_meta:
  workspaces:
  backups:

networks:
  frontend:
    driver: bridge
  backend:
    driver: bridge
